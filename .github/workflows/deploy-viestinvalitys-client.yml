name: Deploy viestinvalityspalvelu client library
on:
  workflow_dispatch:
  release:
    types: [ created ]
  push:
    paths:
      - .github/workflows/deploy-viestinvalitys-client.yml
      - pom.xml
      - settings.xml
      - viestinvalityspalvelu/**

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw --no-transfer-progress -B clean package
        working-directory: viestinvalityspalvelu

  deploy-client-library:
    needs: [ build-and-test ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Deploy Client Library
        #if: ${{ success() && format('refs/heads/{0}', github.event.repository.default_branch) == github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw deploy --batch-mode -DskipTests --projects kirjasto --also-make --settings ../settings.xml
        working-directory: viestinvalityspalvelu
