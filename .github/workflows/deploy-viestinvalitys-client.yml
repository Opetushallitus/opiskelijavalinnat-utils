name: Deploy viestinvalityspalvelu client library
on:
  workflow_dispatch:
  release:
    types: [ created ]
  push:
    paths:
      - .github/workflows/deploy-viestinvalitys-client.yml
      - pom.xml
      - settings.xml
      - viestinvalityspalvelu/**

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3

      - uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw --no-transfer-progress -B clean package
        working-directory: viestinvalityspalvelu

  deploy-client-library:
    needs: [ build-and-test ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3

      - uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Deploy Client Library
        #if: ${{ success() && format('refs/heads/{0}', github.event.repository.default_branch) == github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw deploy --batch-mode -DskipTests --projects kirjasto --also-make --settings ../settings.xml
        working-directory: viestinvalityspalvelu
