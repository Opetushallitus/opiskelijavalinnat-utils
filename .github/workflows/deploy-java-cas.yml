name: Deploy java-cas

# Empty in main. Set to a ticket id (e.g. "OY-1234") on a dev branch
# to deploy under version <base-version>-<TICKET>-SNAPSHOT.
# MUST be empty before merging to main.
env:
  DEV_BRANCH_DEPLOY: 'OY-5623'

on:
  workflow_dispatch:
  release:
    types: [ created ]
  push:
    paths:
      - .github/workflows/deploy-java-cas.yml
      - pom.xml
      - settings.xml
      - java-cas/**
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Refuse dev-only configuration on main
        if: env.DEV_BRANCH_DEPLOY != '' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo "::error::DEV_BRANCH_DEPLOY is set to '${DEV_BRANCH_DEPLOY}' on main. Clear it before merging."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Rewrite artifact version with ticket id
        if: env.DEV_BRANCH_DEPLOY != ''
        run: |
          CURRENT=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          NEW="${CURRENT%-SNAPSHOT}-${DEV_BRANCH_DEPLOY}-SNAPSHOT"
          echo "Rewriting artefact version: $CURRENT -> $NEW"
          mvn -B versions:set -DnewVersion="$NEW" -DgenerateBackupPoms=false
        working-directory: java-cas

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn clean install -B --settings ../settings.xml
        working-directory: java-cas

      - name: Deploy
        if: env.DEV_BRANCH_DEPLOY != '' || (success() && format('refs/heads/{0}', github.event.repository.default_branch) == github.ref)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn deploy --batch-mode -DskipTests
        working-directory: java-cas
